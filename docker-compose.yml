version: '3.8'

services:
  portal:
    build: .
    image: home-portal:latest
    container_name: home-portal
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    networks:
      - portal-network

  # Watchtower - 自动更新容器
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-portal
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_MONITOR_ONLY=true
      - TZ=Asia/Shanghai
    command: home-portal
    networks:
      - portal-network

networks:
  portal-network:
    driver: bridge
